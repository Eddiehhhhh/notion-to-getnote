name: Notion → Get笔记 同步

on:
  # 每30分钟运行一次
  schedule:
    - cron: '*/30 * * * *'
  # 支持手动触发
  workflow_dispatch:
    inputs:
      check_hours:
        description: '检查过去几小时的笔记'
        required: false
        default: '1'
        type: string
  # 支持 repository_dispatch（外部 cron 服务如 cron-job.org）
  repository_dispatch:
    types: [sync]

env:
  NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
  GETNOTE_API_KEY: ${{ secrets.GETNOTE_API_KEY }}
  GETNOTE_CLIENT_ID: ${{ secrets.GETNOTE_CLIENT_ID }}
  NOTION_DB_ID: ${{ vars.NOTION_DB_ID }}

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          pip install --upgrade pip

      - name: 运行同步脚本
        run: python sync.py
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          GETNOTE_API_KEY: ${{ secrets.GETNOTE_API_KEY }}
          GETNOTE_CLIENT_ID: ${{ secrets.GETNOTE_CLIENT_ID }}
          NOTION_DB_ID: ${{ vars.NOTION_DB_ID }}
          CHECK_HOURS: ${{ github.event.inputs.check_hours || '1' }}

      - name: 提交已同步记录
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add processed_ids.json
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: 更新已同步记录 $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          git push || echo "无需推送更新"
