name: Get笔记 ↔ Flomo 双向同步

permissions:
  contents: write

on:
  # 每15分钟运行一次
  schedule:
    - cron: '*/15 * * * *'
  # 支持手动触发
  workflow_dispatch:
  # 支持 repository_dispatch
  repository_dispatch:
    types: [sync]

env:
  NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
  GETNOTE_API_KEY: ${{ secrets.GETNOTE_API_KEY }}
  GETNOTE_CLIENT_ID: ${{ secrets.GETNOTE_CLIENT_ID }}
  NOTION_DB_ID: ${{ vars.NOTION_DB_ID }}
  FLOMO_WEBHOOK_URL: ${{ vars.FLOMO_WEBHOOK_URL }}
  DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          pip install --upgrade pip

      - name: 运行双向同步脚本
        run: python bi_sync.py
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          GETNOTE_API_KEY: ${{ secrets.GETNOTE_API_KEY }}
          GETNOTE_CLIENT_ID: ${{ secrets.GETNOTE_CLIENT_ID }}
          NOTION_DB_ID: ${{ vars.NOTION_DB_ID }}
          FLOMO_WEBHOOK_URL: ${{ vars.FLOMO_WEBHOOK_URL }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      - name: 提交同步状态
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add sync_state.json
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: 更新同步状态 $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          git push || echo "无需推送更新"
